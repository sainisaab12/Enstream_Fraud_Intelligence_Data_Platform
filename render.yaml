# Render Blueprint Specification File for EnStream Fraud Platform
# Deploy the entire stack using Render Blueprints: https://render.com/docs/blueprints

services:
  # 1. Backend FastAPI Service (Python Web Service)
  - type: web
    name: enstream-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/run.py
    envVars:
      # Port binding (Render sets PORT automatically, defaults to 8000)
      - key: PORT
        value: 8000
      # Local storage fallback path
      - key: WAREHOUSE_PATH
        value: ./warehouse
      # AWS S3 / Glue / Redshift Environment variable mappings (Set sync: false to prompt at deploy)
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_REGION
        value: us-east-1
      - key: REDSHIFT_CONN_STR
        sync: false

  # 2. Frontend React Vite Static Site (Hosted SPA)
  - type: web
    name: enstream-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    # SPA Routing fallback
    routes:
      - type: rewrite
        src: /*
        dest: /index.html
    # Environment Variables
    envVars:
      # Bind Vite environment variable to backend service's URL dynamically
      - key: VITE_BACKEND_URL
        fromService:
          type: web
          name: enstream-backend
          property: url
